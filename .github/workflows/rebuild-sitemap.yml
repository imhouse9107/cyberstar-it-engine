name: Rebuild Sitemap

on:
  push:
    branches:
      - main
    paths:
      - 'src/data/blogPosts*.ts'
      - 'src/data/cityPages.ts'
      - 'src/data/blogClusters.ts'

jobs:
  rebuild-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rebuild sitemap.xml
        run: |
          node -e "
          const fs = require('fs');

          const DOMAIN = 'https://cyberstarit.com';

          const CLUSTER_SLUGS = [
            'phone-systems-voip',
            'business-hardware',
            'endpoint-security',
            'managed-detection-response',
            'backup-disaster-recovery',
            'patch-management',
            'cybersecurity-smb',
            'it-buying-guide',
          ];

          const CITY_SLUGS = [
            'new-york',
            'los-angeles',
            'chicago',
            'dallas',
            'atlanta',
            'miami',
            'houston',
            'san-francisco',
          ];

          // Parse all blogPosts files for slugs and dates
          const files = [
            'src/data/blogPosts.ts',
            'src/data/blogPosts-batch2.ts',
            'src/data/blogPosts-batch3.ts',
            'src/data/blogPosts-batch4.ts',
            'src/data/blogPosts-batch5.ts',
            'src/data/blogPosts-batch6.ts',
          ];

          const posts = [];
          files.forEach(function(file) {
            try {
              const raw = fs.readFileSync(file, 'utf-8');
              const slugMatches = raw.matchAll(/slug:\s*[\"']([^\"']+)[\"']/g);
              const dateMatches = [...raw.matchAll(/publishedDate:\s*[\"']([^\"']+)[\"']/g)];
              let i = 0;
              for (const m of slugMatches) {
                if (m[1] === 'string') continue; // skip interface definition
                const date = dateMatches[i] ? dateMatches[i][1] : '2026-03-08';
                posts.push({ slug: m[1], date: date });
                i++;
              }
            } catch(e) {
              console.log('Skipping ' + file + ': ' + e.message);
            }
          });

          // Build XML
          let xml = '<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n';
          xml += '<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">\n';

          function addUrl(loc, lastmod) {
            xml += '  <url>\n';
            xml += '    <loc>' + loc + '</loc>\n';
            if (lastmod) xml += '    <lastmod>' + lastmod + '</lastmod>\n';
            xml += '  </url>\n';
          }

          // Static pages
          addUrl(DOMAIN + '/');
          addUrl(DOMAIN + '/blog');

          // Cluster pages
          CLUSTER_SLUGS.forEach(function(cs) {
            addUrl(DOMAIN + '/blog/topic/' + cs);
          });

          // City pages
          CITY_SLUGS.forEach(function(city) {
            addUrl(DOMAIN + '/' + city);
          });

          // Article pages
          posts.forEach(function(p) {
            addUrl(DOMAIN + '/blog/' + p.slug, p.date);
          });

          xml += '</urlset>\n';

          fs.writeFileSync('public/sitemap.xml', xml, 'utf-8');
          console.log('Sitemap rebuilt with ' + (2 + CLUSTER_SLUGS.length + CITY_SLUGS.length + posts.length) + ' URLs (' + posts.length + ' articles)');
          "

      - name: Check for changes and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sitemap.xml
          if git diff --cached --quiet
          then
            echo "No sitemap changes to commit."
          else
            git commit -m "chore: rebuild sitemap.xml [automated]"
            git push
          fi
